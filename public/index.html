<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>REI Baby Analyzer - Weekly Tests</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
      background: white;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 40px;
      text-align: center;
    }
    .header h1 { font-size: 2.5em; margin-bottom: 10px; }
    .header p { font-size: 1.1em; opacity: 0.9; }
    .content { padding: 40px; }
    .status-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }
    .card {
      background: #f8f9fa;
      border-left: 4px solid #667eea;
      padding: 20px;
      border-radius: 8px;
    }
    .card.success { border-left-color: #10b981; }
    .card.error { border-left-color: #ef4444; }
    .card label {
      font-size: 0.85em;
      color: #666;
      text-transform: uppercase;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    .card .value {
      font-size: 2em;
      font-weight: 700;
      color: #1f2937;
    }
    .table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    .table thead {
      background: #f8f9fa;
      border-bottom: 2px solid #e5e7eb;
    }
    .table th {
      padding: 12px;
      text-align: left;
      font-weight: 600;
      color: #374151;
    }
    .table td {
      padding: 12px;
      border-bottom: 1px solid #e5e7eb;
    }
    .table tbody tr:hover { background: #f9fafb; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
    }
    .badge.pass { background: #d1fae5; color: #065f46; }
    .badge.fail { background: #fee2e2; color: #991b1b; }
    .badge.error { background: #fef2f2; color: #7f1d1d; }
    .loading { text-align: center; padding: 40px; color: #999; }
    .error-msg { color: #dc2626; padding: 20px; background: #fee2e2; border-radius: 8px; }
    .footer { background: #f8f9fa; padding: 20px; text-align: center; color: #666; font-size: 0.9em; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🧪 Baby Analyzer Weekly Tests</h1>
      <p>Automated QA • Runs Monday 1AM UTC via GitHub Actions</p>
    </div>

    <div class="content">
      <div id="stats" class="status-grid">
        <div class="card">
          <label>Latest Run</label>
          <div class="value" id="latest">-</div>
        </div>
        <div class="card">
          <label>Passed</label>
          <div class="value success" id="passed">-</div>
        </div>
        <div class="card">
          <label>Failed</label>
          <div class="value" id="failed">-</div>
        </div>
        <div class="card">
          <label>Pass Rate</label>
          <div class="value" id="rate">-</div>
        </div>
      </div>

      <div id="error" class="error-msg" style="display:none;"></div>
      <div id="results" class="loading">Loading test results...</div>
    </div>

    <div class="footer">
      <p>Tests run automatically every Monday at 1:00 AM UTC</p>
      <p>Baby Analyzer: <a href="https://rei-baby-analyzer-production.up.railway.app/" target="_blank" style="color: #667eea; text-decoration: none;">Live App</a> | <a href="https://github.com/gpghequity/rei-weekly-tests" target="_blank" style="color: #667eea; text-decoration: none;">GitHub</a></p>
    </div>
  </div>

  <script>
    // This would be populated by the GitHub Actions workflow posting to Sheets
    // For now, show placeholder
    fetch('/api/results')
      .then(r => r.json())
      .catch(() => ({
        latest: new Date().toLocaleDateString(),
        passed: '-',
        failed: '-',
        results: []
      }))
      .then(data => {
        document.getElementById('latest').textContent = data.latest || 'Never';
        document.getElementById('passed').textContent = data.passed ?? '-';
        document.getElementById('failed').textContent = data.failed ?? '-';

        if (data.passed !== undefined && data.total !== undefined) {
          const rate = Math.round((data.passed / data.total) * 100);
          document.getElementById('rate').textContent = rate + '%';
        }

        if (data.results && data.results.length > 0) {
          const html = `
            <table class="table">
              <thead>
                <tr>
                  <th>Date</th>
                  <th>Passed</th>
                  <th>Failed</th>
                  <th>Total</th>
                  <th>Properties</th>
                </tr>
              </thead>
              <tbody>
                ${data.results.map(r => `
                  <tr>
                    <td>${new Date(r.timestamp).toLocaleDateString()}</td>
                    <td><strong>${r.passed}</strong></td>
                    <td>${r.failed}</td>
                    <td>${r.total}</td>
                    <td>${r.properties || '-'}</td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          `;
          document.getElementById('results').innerHTML = html;
        } else {
          document.getElementById('results').innerHTML = '<p style="text-align:center; color: #999;">No test results yet. Tests run Monday 1AM UTC.</p>';
        }
      })
      .catch(e => {
        document.getElementById('error').textContent = 'Error loading results: ' + e.message;
        document.getElementById('error').style.display = 'block';
      });
  </script>
</body>
</html>
